
#----------------------------------------------------------------
# Main pipeline config file for the standrad neutrino oscillation
#----------------------------------------------------------------

#---- Define some binning as dict objects
#include settings/binning/upgrade_binning.cfg as binning


#---- Define some constants, like the best-fit oscillation parameters
#---- Note: these are located in $PISA/pisa_examples/resources/settings/osc/
#include settings/osc/nufitv52.cfg as osc
#include settings/osc/earth.cfg as earth


#---- Define the name and some specifications about the event selection 
#include settings/pipeline/stages_upgrade/upgrade_sample.cfg

#---- First PISA stage to be called: Define location and quantities to load 
#include settings/pipeline/stages_upgrade/neutrino_data_stage_nue.cfg

#---- PISA stage for MCEq
#include settings/pipeline/stages_shared/neutrino_flux_stage.cfg

#---- PISA stage for prob3
#include settings/pipeline/stages_shared/neutrino_osc_stage.cfg

#---- PISA stage for genie cross-sections
#include settings/pipeline/stages_shared/neutrino_xsec_stage.cfg

#---- call to PISA stage pi_aeff (defines nc + nutau normalisation, applies OneWeight)
#include settings/pipeline/stages_shared/neutrino_weight_stage.cfg

#---- Module that bins data into the analysis binning
#include settings/pipeline/stages_shared/hist_stage.cfg

#---- Ultrasurfaces
#include settings/pipeline/stages_upgrade/neutrino_ultrasurface_stage.cfg



[pipeline]

# define order of stages to be excecuted one after another
order = data.simple_data_loader, flux.honda_ip, flux.mceq_barr, osc.prob3, aeff.aeff
#, utils.hist

# Select the params denoted by param.<param_selector>.<param_name>
param_selections = nh

# Name the contents of this pipeline
name = neutrinos

# Detector
detector_name = upgrade

# if maps should be created as the output of the stage
output_binning = ${event_selection_specs:output_binning}
output_key = ${event_selection_specs:output_key}


[utils.fix_error]

calc_mode = ${utils.hist:apply_mode}
apply_mode = ${utils.hist:apply_mode}
