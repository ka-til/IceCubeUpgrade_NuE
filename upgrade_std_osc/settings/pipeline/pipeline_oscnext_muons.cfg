#include settings/binning/oscNext_binning.cfg as binning

#include settings/pipeline/stages_oscnext/oscNext_sample.cfg

#include settings/pipeline/stages_oscnext/muon_data_stage.cfg
#include settings/pipeline/stages_shared/muon_sys_stage.cfg
#include settings/pipeline/stages_shared/muon_weight_stage.cfg
#include settings/pipeline/stages_oscnext/muon_kde_stage.cfg
#include settings/pipeline/stages_shared/hist_stage.cfg

[pipeline]

# define order of stages to be excecuted one after another
# not including hypersurfaces, since have cut the muons so hard now that they are not needed
order = data.simple_data_loader, background.atm_muons, aeff.weight, utils.kde
#order = data.simple_data_loader, background.atm_muons, aeff.weight

# Name the contents of this pipeline
name = muons

# Detector
detector_name = deepcore

# if maps should be created as the output of the stage
output_binning = ${event_selection_specs:output_binning}
output_key = weights
