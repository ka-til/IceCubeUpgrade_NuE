[discr_sys.ultrasurfaces]

calc_mode = events
apply_mode = events

# DOM efficiency
# Gaussian prior, defined by the +/- sigma
param.dom_eff = 1.0 +/- 0.1
#param.dom_eff = 1.0 +/- 0.012
param.dom_eff.fixed = False
param.dom_eff.range = [0.8, 1.2] * units.dimensionless
param.dom_eff.tex = \epsilon_{\rm{DOM}}

# new DOM efficiency
# Gaussian prior, defined by the +/- sigma
param.icu_dom_eff = 1.0 +/- 0.05
#param.icu_dom_eff = 1.0 +/- 0.012
param.icu_dom_eff.fixed = False
param.icu_dom_eff.range = [0.95, 1.05] * units.dimensionless
param.icu_dom_eff.tex = \epsilon_{\rm{DOM}}

# hole ice scattering
