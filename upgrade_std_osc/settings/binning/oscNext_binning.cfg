# oscNext reco binning
# Masking out low energy regions in more track-like bins since they have O(0) expected counts
# Also masking any high energy regions where we run out of stats
reco_oscNext.order = reco_energy, reco_coszen, pid
reco_oscNext.reco_energy = {'num_bins':12, 'is_log':True, 'domain':[5., 300.]*units.GeV, 'tex': r'E_{\rm reco}'}
reco_oscNext.reco_coszen = {'num_bins':10, 'is_lin':True, 'domain':[-1, 0.3], 'tex':r'\cos\,\theta_{z,{\rm reco}}'}
reco_oscNext.pid = {'bin_edges': [0., 0.5, 0.85, 1.], 'tex':r'{\rm PID}', 'bin_names':['cascades', 'mixed', 'tracks'] }
reco_oscNext.mask = [(0,9,1), (0,8,1), (0,7,1), (0,6,1), (0,5,1), (0,4,1), (0,3,1), (0,9,2), (0,8,2), (0,7,2), (0,6,2), (0,5,2), (0,4,2), (0,3,2), (0,2,2), (0,1,2), (0,0,2), (1,9,2), (1,8,2), (1,7,2), (1,6,2), (1,5,2), (1,4,2), (1,3,2), (1,2,2), (1,1,2), (1,0,2), (2,9,2), (2,8,2), (2,7,2), (2,6,2), (2,5,2), (2,4,2), (2,3,2), (2,2,2), (2,1,2), (3,9,2), (3,8,2), (3,7,2), (3,6,2), (3,5,2), (3,4,2), (3,3,2), (3,2,2), (11,9,1), (11,8,1), (11,7,1), (11,6,1), (11,5,1), (11,4,1), (11,3,1), (11,2,1), (11,1,1), (11,0,1)]

# oscNext truth calc binning
true_oscNext.order = true_energy, true_coszen
true_oscNext.true_energy = {'num_bins':15, 'is_log':True, 'domain':[3.,300.] * units.GeV, 'tex': r'E_{\rm true}'}
true_oscNext.true_coszen = {'num_bins':15, 'is_lin':True, 'domain':[-1,1], 'tex':r'\cos\,\theta_{z,{\rm true}}'}

# oscNext xsec binning
xsec_oscNext.order = true_energy, bjorken_y
xsec_oscNext.true_energy = {'num_bins':30, 'is_log':True, 'domain':[3.,300.] * units.GeV, 'tex': r'E_{\rm true}'}
xsec_oscNext.bjorken_y = {'num_bins':30, 'is_lin':True, 'domain':[0.,1.], 'tex':r'{\rm Bjorken\ } y'}

# Binning for oscillation probability calc
# Denser binning for core-crossing events due to structure there at low energies
# Cover full generation range, which is coszen=[-1., 1.], energy=[1 GeV, 10 TeV]
osc_binning.order = true_energy, true_coszen
osc_binning.true_energy = {'num_bins':150, 'is_log':True, 'domain':[1.e0, 1.e4] * units.GeV, 'tex': r'E_{\rm true}'}
osc_binning.true_coszen = {'bin_edges':np.concatenate((np.linspace(-1.,0.1,100), np.linspace(0.1,1.,50)[1:])), 'tex':r'\cos\,\theta_{Z,{\rm true}}'}

# Binning for flux calculation
# Less fine detail in the shape than oscillogram, so can use less bins
# Cover full generation range, which is coszen=[-1., 1.], energy=[1 GeV, 10 TeV]
flux_binning.order = true_energy, true_coszen
flux_binning.true_energy = {'num_bins':150, 'is_log':True, 'domain':[1.e0, 1.e4] * units.GeV, 'tex':r'E_{\rm true}'}
flux_binning.true_coszen = {'num_bins':150, 'is_lin':True, 'domain':[-1., 1.], 'tex':r'\cos\,\theta_{z,{\rm true}}'}

# Grid for oscillogram and other similar plots
oscillogram_grid.order = true_energy, true_coszen
#oscillogram_grid.true_energy = {'num_bins':250, 'is_log':True, 'domain':[1., 100.] * units.GeV, 'tex': r'E_{\nu} \, [{\rm GeV}]'}
oscillogram_grid.true_energy = {'num_bins':250, 'is_log':True, 'domain':[1., 1.e4] * units.GeV, 'tex': r'E_{\nu} \, [{\rm GeV}]'}
oscillogram_grid.true_coszen = {'num_bins':250, 'is_lin':True, 'domain':[-1, +1.], 'tex':r'\cos(\theta_{\rm zenith})'}

oscillogram_nmo_grid.order = true_energy, true_coszen
oscillogram_nmo_grid.true_energy = {'num_bins':250, 'is_lin':True, 'domain':[0., 20.] * units.GeV, 'tex': r'E_{\nu} \, [{\rm GeV}]'}
oscillogram_nmo_grid.true_coszen = {'num_bins':250, 'is_lin':True, 'domain':[-1, 0.], 'tex':r'\cos(\theta_{\rm zenith})'}
